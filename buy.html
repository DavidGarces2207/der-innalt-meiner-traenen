<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaufen - Der Inhalt meiner Tränen</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 60px;
}

.card {
  background: #1c1c1c;
  padding: 30px;
  border-radius: 12px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

p {
  font-size: 18px;
  line-height: 1.6;
  opacity: 0.9;
}

.price {
  font-size: 32px;
  color: #00d26a;
  margin: 20px 0;
  font-weight: bold;
}

.btn {
  display: inline-block;
  padding: 15px 25px;
  background: #635bff; /* Stripe color */
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 18px;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #4b42d8;
  transform: scale(1.05);
}

.review {
  margin-top: 20px;
  font-style: italic;
  opacity: 0.8;
}

.small {
  margin-top: 15px;
  font-size: 13px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">

    <h1>Der Inhalt meiner Tränen</h1>

    <p>
      Eine emotionale Reise durch Schmerz, Verlust und Hoffnung.  
      Dieses Buch erzählt eine wahre Geschichte voller Emotionen.
    </p>

    <div class="price">18,00 €</div>

    <!-- STRIPE LINK -->
    <a class="btn" href="https://buy.stripe.com/TU_STRIPE_LINK" target="_blank">
      Mit Karte bezahlen
    </a>

    <div class="review">
      ⭐⭐⭐⭐⭐ „Sehr emotional, tief und ehrlich geschrieben.“
    </div>

    <div class="small">
      Sicherer Checkout über Stripe
    </div>

  </div>

</div>

</body>
</html>
