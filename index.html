<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Der Inhalt meiner Tränen</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background-image: url("cover.jpg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: white;
}

/* overlay oscuro elegante */
.overlay {
  min-height: 100vh;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.85),
    rgba(0,0,0,0.4)
  );
  display: flex;
  align-items: center;
  padding: 60px;
}

/* caja de contenido */
.content {
  max-width: 650px;
}

/* título estilo libro */
h1 {
  font-size: 64px;
  margin: 0 0 20px;
  line-height: 1.1;
  text-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* subtítulo */
p {
  font-size: 20px;
  line-height: 1.6;
  opacity: 0.9;
}

/* botón principal */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 16px 28px;
  font-size: 18px;
  background: #e63946;
  color: white;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #ff2e3b;
  transform: scale(1.05);
}

/* selector idioma */
.lang {
  position: absolute;
  top: 20px;
  right: 30px;
}

.lang a {
  color: white;
  margin-left: 12px;
  text-decoration: none;
  font-weight: bold;
  opacity: 0.8;
}

.lang a:hover {
  opacity: 1;
}
</style>
</head>

<body>

<div class="overlay">

  <div class="lang">
    <a href="index.html">DE</a>
    <a href="es.html">ES</a>
  </div>

  <div class="content">

    <h1>Der Inhalt meiner Tränen</h1>

    <p>
      Eine emotionale Reise durch Schmerz, Verlust und Hoffnung.  
      Eine Geschichte, die zeigt, dass selbst aus Tränen Stärke entstehen kann.
    </p>

    <a class="btn" href="#" onclick="alert('Kauf kommt bald')">
      Jetzt Buch sichern
    </a>

  </div>

</div>

</body>
</html>
